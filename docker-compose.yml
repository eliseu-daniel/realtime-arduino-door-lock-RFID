services:
  db:
    image: mysql:8.0
    container_name: controle-acesso-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: controle_acesso
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/script.sql:/docker-entrypoint-initdb.d/script.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      network: host
    container_name: controle-acesso-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: controle_acesso
      JWT_SECRET: minha_chave_super_secreta_2024
      JWT_EXPIRES_IN: 7d
      SERIAL_PORT: /dev/ttyUSB0
      SERIAL_BAUD_RATE: 9600
    # Descomente abaixo se tiver um Arduino conectado via USB:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0

volumes:
  mysql_data:
